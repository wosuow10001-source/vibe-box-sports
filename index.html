<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Vibe Sports | AI MatchSignal (Full Streamlit)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css" />
    <style>
        body { 
            margin: 0; padding: 0; background-color: #0f172a; color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: 'Inter', system-ui, sans-serif;
        }
        #stlite { width: 100%; height: 100vh; visibility: hidden; }
        #loading { text-align: center; position: absolute; z-index: 10; }
        .spinner { 
            border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #CCFF00; 
            border-radius: 50%; width: 60px; height: 60px; 
            animation: spin 1s linear infinite; margin: 0 auto 30px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .brand { font-size: 2.2rem; font-weight: 800; color: #CCFF00; margin-bottom: 10px; text-transform: uppercase; letter-spacing: -1px; }
        .status { font-size: 1.1rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="brand">VIBE BOX SPORTS</div>
        <div class="spinner"></div>
        <p style="font-size: 1.3rem; font-weight: 700;">시스템 배포 중... (모든 리그 지원)</p>
        <p class="status" id="statusText">프로젝트 매니페스트(68개 모듈)를 불러오는 중...</p>
    </div>
    <div id="stlite"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
        async function loadApp() {
            const statusText = document.getElementById('statusText');
            try {
                // 1. Fetch the manifest
                statusText.innerText = "데이터 파일 로딩 중 (1.4MB)...";
                const response = await fetch('stlite-manifest.json');
                if (!response.ok) throw new Error('매니페스트 파일을 찾을 수 없습니다.');
                const filesRaw = await response.json();

                // 2. Format files for stlite
                statusText.innerText = "Python 가상 파일 시스템 구축 중...";
                const stliteFiles = {};
                for (const [path, data] of Object.entries(filesRaw)) {
                    if (typeof data === 'object' && data.content) {
                        if (data.encoding === 'base64') {
                            stliteFiles[path] = { "data": data.content };
                        } else {
                            stliteFiles[path] = data.content;
                        }
                    } else {
                        stliteFiles[path] = data;
                    }
                }

                // 3. Mount Streamlit
                statusText.innerText = "Python 환경 부팅 중 (약 10초)...";
                stlite.mount({
                    requirements: ["streamlit", "pandas", "numpy", "scipy", "pillow", "beautifulsoup4", "lxml", "qrcode"],
                    entrypoint: "app.py",
                    files: stliteFiles,
                }, document.getElementById("stlite"));

                // Show stlite once it's likely ready
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('stlite').style.visibility = 'visible';
                }, 8000);

            } catch (err) {
                console.error(err);
                statusText.innerHTML = `<span style="color: #ef4444;">오류 발생: ${err.message}</span><br>파일이 모두 업로드되었는지 확인하세요.`;
            }
        }

        loadApp();
    </script>
</body>
</html>
