<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>VIBE BOX SPORTS | AI MatchSignal</title>
    <!-- SEO Meta Tags -->
    <meta name="google-site-verification" content="4UDRKCnaDMW-rvurPh_Y2E7k0C-0s_Vw-R0e8F5R5rY" />
    <meta name="google-site-verification" content="ovEC7t-O6fQOLmeHv7kO3hX1fI6YEqitU-J3-MivhIs" />
    <meta name="description" content="AI 기반 스포츠 경기 예측 플랫폼. 해외축구, NBA, MLB, KBL 실시간 분석 및 정밀 예측 제공." />
    <link rel="canonical" href="https://wosuow10001-source.github.io/vibe-box-sports/app-portal.html" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Stlite Styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.css" />
    <style>
        :root {
            --neon-yellow: #CCFF00;
            --dark-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }
        body { 
            margin: 0; padding: 0; background-color: var(--dark-bg); color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: 'Outfit', 'Inter', sans-serif;
            overflow: hidden;
        }
        #stlite { width: 100%; height: 100vh; visibility: hidden; }
        
        #loading-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            width: 100%; height: 100%; position: absolute; z-index: 100;
            transition: opacity 0.5s ease;
        }

        .loader-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        .brand-logo {
            font-size: 2.5rem; font-weight: 800; color: var(--neon-yellow); 
            margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(204, 255, 0, 0.3);
        }

        .spinner { 
            border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: var(--neon-yellow); 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; margin: 2rem auto; 
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .progress-bar {
            width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1);
            border-radius: 2px; margin-top: 1rem; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--neon-yellow); width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--neon-yellow);
        }

        .status-text { font-size: 0.9rem; color: #94a3b8; font-weight: 500; margin-top: 1.5rem; min-height: 1.2rem; }
        
        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: var(--neon-yellow); filter: blur(150px);
            opacity: 0.05; border-radius: 50%; z-index: -1;
        }
    </style>
</head>
<body>
    <div id="loading-container">
        <div class="bg-glow"></div>
        <div class="loader-card">
            <div class="brand-logo">VIBE BOX</div>
            <div style="font-weight: 700; color: white; opacity: 0.8; letter-spacing: 1px;">AI MATCH SIGNAL</div>
            <div class="spinner"></div>
            <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem;">시스템 부팅 중...</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p class="status-text" id="statusText">초기 설정 중...</p>
        </div>
    </div>
    
    <div id="stlite"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
        async function loadApp() {
            const statusText = document.getElementById('statusText');
            const progressFill = document.getElementById('progressFill');
            
            const updateUI = (text, percent) => {
                statusText.innerText = text;
                progressFill.style.width = percent + '%';
            };

            try {
                updateUI("프로젝트 매니페스트 불러오는 중...", 20);
                const response = await fetch('stlite-manifest.json');
                if (!response.ok) throw new Error('매니페스트 파일을 찾을 수 없습니다.');
                const filesRaw = await response.json();

                updateUI("가상 파일 시스템 구축 중...", 40);
                const stliteFiles = {};
                for (const [path, data] of Object.entries(filesRaw)) {
                    if (typeof data === 'object' && data.content) {
                        if (data.encoding === 'base64') {
                            // Binary files (DB, images) decoding properly for stlite
                            const binaryString = window.atob(data.content);
                            const len = binaryString.length;
                            const bytes = new Uint8Array(len);
                            for (let i = 0; i < len; i++) {
                                bytes[i] = binaryString.charCodeAt(i);
                            }
                            stliteFiles[path] = { "data": bytes };
                        } else {
                            stliteFiles[path] = data.content;
                        }
                    } else {
                        stliteFiles[path] = data;
                    }
                }

                updateUI("Python 엔진 부팅 중 (약 10초)...", 70);
                stlite.mount({
                    requirements: [
                        "streamlit", "pandas", "numpy", "pillow", 
                        "beautifulsoup4", "lxml", "qrcode",
                        "requests", "schedule", "sqlite3",
                        "scipy", "scikit-learn"
                    ],
                    entrypoint: "app.py",
                    files: stliteFiles,
                }, document.getElementById("stlite"));

                // Monitor for the app to be ready
                updateUI("애플리케이션 준비 중...", 90);
                
                // Hide loader once stlite container starts rendering
                const checkReady = setInterval(() => {
                    const stliteContainer = document.getElementById('stlite');
                    if (stliteContainer.children.length > 0) {
                        updateUI("완료!", 100);
                        setTimeout(() => {
                            document.getElementById('loading-container').style.opacity = '0';
                            document.getElementById('stlite').style.visibility = 'visible';
                            setTimeout(() => {
                                document.getElementById('loading-container').style.display = 'none';
                            }, 500);
                        }, 500);
                        clearInterval(checkReady);
                    }
                }, 500);

            } catch (err) {
                console.error(err);
                statusText.innerHTML = `<span style="color: #ef4444;">오류: ${err.message}</span>`;
                progressFill.style.backgroundColor = "#ef4444";
            }
        }

        loadApp();
    </script>
</body>
</html>
